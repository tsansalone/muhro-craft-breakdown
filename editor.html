<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Item Editor — RO Craft Breakdown</title>
  <style>
    :root {
      --bg-deep:      #0e0b06;
      --bg-panel:     #1a1208;
      --bg-card:      #241a0d;
      --bg-hover:     #2e2010;
      --border:       #5a3e1b;
      --border-light: #7a5a2a;
      --gold:         #c9a84c;
      --gold-bright:  #e8c96a;
      --text-primary: #e8d5a3;
      --text-secondary:#a8905a;
      --text-muted:   #6b5030;
      --craftable:    #7ecfb0;
      --raw:          #b0a080;
      --danger:       #c04040;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(180deg, #2a1a08, #1a1208);
      border-bottom: 2px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; color: var(--gold-bright); }
    .load-info { color: var(--text-muted); font-size: 0.78rem; flex: 1; font-style: italic; }

    /* ── Layout ── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--bg-panel);
    }
    .sidebar-toolbar {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .sidebar-search {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-primary);
      font-size: 0.82rem;
      padding: 5px 8px;
      outline: none;
      font-family: inherit;
    }
    .sidebar-search:focus { border-color: var(--gold); }
    .item-list { flex: 1; overflow-y: auto; }
    .item-entry {
      padding: 7px 12px;
      cursor: pointer;
      border-bottom: 1px solid rgba(90,62,27,0.2);
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .item-entry:hover { background: var(--bg-hover); }
    .item-entry.selected {
      background: rgba(201,168,76,0.08);
      border-left: 2px solid var(--gold);
      padding-left: 10px;
    }
    .item-entry-name { flex: 1; font-size: 0.86rem; }
    .item-entry-tag  {
      font-size: 0.65rem;
      border-radius: 2px;
      padding: 1px 5px;
      border: 1px solid;
      flex-shrink: 0;
    }
    .tag-craftable { color: var(--craftable); border-color: var(--craftable); }
    .tag-raw       { color: var(--raw);        border-color: var(--raw); }

    /* ── Editor ── */
    .editor {
      flex: 1;
      overflow-y: auto;
      padding: 22px 32px;
    }
    .editor-empty {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-style: italic;
    }
    .editor-title {
      color: var(--gold-bright);
      font-size: 1rem;
      margin-bottom: 20px;
    }

    /* ── Fields ── */
    .field-group { margin-bottom: 14px; }
    .field-label {
      display: block;
      color: var(--gold);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .field-hint { font-size: 0.62rem; color: var(--text-muted); text-transform: none; letter-spacing: 0; }
    .field-input {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9rem;
      padding: 6px 10px;
      width: 100%;
      outline: none;
    }
    .field-input:focus { border-color: var(--gold); }
    .field-input[readonly] { opacity: 0.5; cursor: not-allowed; }
    .field-row { display: flex; gap: 12px; }
    .field-row .field-group { flex: 1; }

    /* ── Toggle ── */
    .toggle-row { display: flex; align-items: center; gap: 10px; }
    .toggle-label { color: var(--text-secondary); font-size: 0.86rem; }
    .toggle-switch { position: relative; display: inline-block; width: 38px; height: 20px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider { background: rgba(201,168,76,0.35); }
    .toggle-switch input:checked + .toggle-slider::before {
      background: var(--gold);
      transform: translateX(18px);
    }

    /* ── Recipe table ── */
    .recipe-section { margin-top: 4px; }
    .recipe-table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
    .recipe-table th {
      text-align: left;
      color: var(--text-muted);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 8px;
      border-bottom: 1px solid var(--border);
      font-weight: normal;
    }
    .recipe-table td {
      padding: 4px 6px;
      border-bottom: 1px solid rgba(90,62,27,0.2);
      vertical-align: middle;
    }
    .recipe-item-select, .recipe-qty-input {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.82rem;
      padding: 4px 8px;
      outline: none;
    }
    .recipe-item-select:focus, .recipe-qty-input:focus { border-color: var(--gold); }
    .recipe-item-select { width: 100%; }
    .recipe-qty-input { width: 90px; text-align: right; }
    /* Hide number input spinners */
    .recipe-qty-input::-webkit-inner-spin-button,
    .recipe-qty-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .recipe-qty-input { -moz-appearance: textfield; }

    /* ── Buttons ── */
    .btn {
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      padding: 5px 14px;
      border: 1px solid;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-primary { background: rgba(201,168,76,0.12); border-color: var(--gold); color: var(--gold); }
    .btn-primary:hover { background: rgba(201,168,76,0.28); }
    .btn-ghost  { background: transparent; border-color: var(--border); color: var(--text-secondary); }
    .btn-ghost:hover  { border-color: var(--gold); color: var(--gold); }
    .btn-danger { background: transparent; border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: rgba(192,64,64,0.12); }
    .btn-sm { padding: 3px 10px; }

    .editor-actions {
      display: flex;
      gap: 10px;
      margin-top: 22px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      align-items: center;
    }
    .editor-actions .spacer { flex: 1; }

    /* ── Save bar ── */
    .save-bar {
      padding: 9px 20px;
      border-top: 2px solid var(--border);
      background: var(--bg-panel);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .save-bar .bar-info { color: var(--text-muted); font-size: 0.78rem; flex: 1; }

    /* ── Notice ── */
    .notice {
      padding: 8px 12px;
      border-radius: 3px;
      font-size: 0.8rem;
      margin-bottom: 14px;
    }
    .notice-err { background: rgba(192,64,64,0.1); border: 1px solid rgba(192,64,64,0.4); color: #c06060; }
    .notice-ok  { background: rgba(100,180,100,0.1); border: 1px solid rgba(100,180,100,0.35); color: #7ecf7e; }

    /* ── Load overlay ── */
    .load-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.82);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
    }
    .load-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 36px 44px;
      text-align: center;
      max-width: 420px;
    }
    .load-card h2 { color: var(--gold-bright); margin-bottom: 10px; font-size: 1.1rem; }
    .load-card p  { color: var(--text-secondary); margin-bottom: 22px; font-size: 0.86rem; line-height: 1.6; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
  </style>
</head>
<body>

<header>
  <h1>Item Editor</h1>
  <span class="load-info" id="load-info">Loading items.json…</span>
  <label class="btn btn-ghost btn-sm" style="cursor:pointer">
    Open file… <input type="file" accept=".json" id="file-input" style="display:none">
  </label>
</header>

<div class="main">

  <div class="sidebar">
    <div class="sidebar-toolbar">
      <input class="sidebar-search" type="text" id="sidebar-search" placeholder="Search items…">
      <button class="btn btn-primary btn-sm" id="new-item-btn">+ New</button>
    </div>
    <div class="item-list" id="item-list"></div>
  </div>

  <div class="editor" id="editor">
    <div class="editor-empty">Select an item to edit, or click "+ New" to add one.</div>
  </div>

</div>

<div class="save-bar">
  <span class="bar-info" id="bar-info"></span>
  <button class="btn btn-ghost btn-sm" id="download-btn">⬇ Download items.json</button>
</div>

<!-- Fallback overlay when auto-fetch fails (e.g. opened as file://) -->
<div class="load-overlay" id="load-overlay" style="display:none">
  <div class="load-card">
    <h2>Open items.json</h2>
    <p>Could not auto-load the file (likely opened directly without a local server). Pick the file manually to get started.</p>
    <label class="btn btn-primary" style="cursor:pointer; display:inline-block">
      Browse… <input type="file" accept=".json" id="overlay-file-input" style="display:none">
    </label>
  </div>
</div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────
let rawData    = null;   // full parsed JSON (preserves _schema and key order)
let items      = [];     // working copy of items array
let editingId  = null;   // id of item in the editor; null when adding new
let filterQuery = '';
let unsaved    = false;

// ── Bootstrap ──────────────────────────────────────────────────────────────
async function autoLoad() {
  try {
    const res = await fetch('data/items.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    loadData(data, 'data/items.json');
  } catch {
    document.getElementById('load-overlay').style.display = 'flex';
    document.getElementById('load-info').textContent = 'Auto-load failed — open the file manually.';
  }
}

function loadData(data, label) {
  rawData = data;
  // Filter out _comment / schema objects (they have no id)
  items = (data.items || []).filter(i => typeof i.id === 'string' && i.id !== '');
  document.getElementById('load-overlay').style.display = 'none';
  document.getElementById('load-info').textContent = label;
  unsaved = false;
  updateBarInfo();
  renderSidebar();
}

function readFileObj(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      loadData(JSON.parse(e.target.result), file.name);
    } catch (err) {
      alert('Could not parse JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
}

document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) readFileObj(e.target.files[0]);
  e.target.value = '';
});
document.getElementById('overlay-file-input').addEventListener('change', e => {
  if (e.target.files[0]) readFileObj(e.target.files[0]);
  e.target.value = '';
});

// ── Sidebar ────────────────────────────────────────────────────────────────
function renderSidebar() {
  const listEl = document.getElementById('item-list');
  const q = filterQuery.toLowerCase();

  const visible = q
    ? items.filter(i =>
        i.name.toLowerCase().includes(q) ||
        i.id.toLowerCase().includes(q)
      )
    : items;

  listEl.innerHTML = '';
  if (visible.length === 0) {
    listEl.innerHTML = '<div style="padding:14px 12px;color:var(--text-muted);font-style:italic;font-size:0.8rem">No items found.</div>';
    return;
  }

  for (const item of visible) {
    const div = document.createElement('div');
    div.className = 'item-entry' + (item.id === editingId ? ' selected' : '');
    div.innerHTML =
      `<span class="item-entry-name">${esc(item.name)}</span>` +
      `<span class="item-entry-tag ${item.craftable ? 'tag-craftable' : 'tag-raw'}">${item.craftable ? 'craft' : 'raw'}</span>`;
    div.addEventListener('click', () => startEdit(item.id));
    listEl.appendChild(div);
  }
}

document.getElementById('sidebar-search').addEventListener('input', e => {
  filterQuery = e.target.value.trim();
  renderSidebar();
});

// ── Editor ─────────────────────────────────────────────────────────────────
function startEdit(id) {
  editingId = id;
  const item = items.find(i => i.id === id);
  renderEditor(item ? JSON.parse(JSON.stringify(item)) : null, false);
  renderSidebar();
}

document.getElementById('new-item-btn').addEventListener('click', () => {
  editingId = null;
  renderEditor({ id: '', name: '', craftable: false, recipe: [] }, true);
  renderSidebar();
});

function renderEditor(item, isNew) {
  const editorEl = document.getElementById('editor');
  if (!item) {
    editorEl.innerHTML = '<div class="editor-empty">Select an item to edit, or click "+ New" to add one.</div>';
    return;
  }

  const recipe = item.recipe || [];

  editorEl.innerHTML = `
    <div class="editor-title">${isNew ? 'New Item' : 'Edit: ' + esc(item.name)}</div>

    <div id="editor-notice"></div>

    <div class="field-row">
      <div class="field-group" style="flex: 0 0 190px">
        <label class="field-label">ID <span class="field-hint">(kebab-case or numeric)</span></label>
        <input class="field-input" id="f-id" type="text" value="${esc(item.id)}"
               placeholder="e.g. 1001234 or iron-ore"
               ${isNew ? '' : 'readonly'}>
      </div>
      <div class="field-group">
        <label class="field-label">Name</label>
        <input class="field-input" id="f-name" type="text" value="${esc(item.name)}" placeholder="Display name">
      </div>
    </div>

    <div class="field-row">
      <div class="field-group">
        <label class="field-label">Type</label>
        <div class="toggle-row">
          <label class="toggle-switch">
            <input type="checkbox" id="f-craftable" ${item.craftable ? 'checked' : ''}>
            <span class="toggle-slider"></span>
          </label>
          <span class="toggle-label" id="craftable-label">
            ${item.craftable ? 'Craftable (has a recipe)' : 'Raw material (no recipe)'}
          </span>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Droppable <span class="field-hint">(craft checkbox defaults to off)</span></label>
        <div class="toggle-row">
          <label class="toggle-switch">
            <input type="checkbox" id="f-droppable" ${item.droppable ? 'checked' : ''}>
            <span class="toggle-slider"></span>
          </label>
          <span class="toggle-label">${item.droppable ? 'Obtainable via drop / buy' : 'Not flagged as droppable'}</span>
        </div>
      </div>
    </div>

    <div id="recipe-section" class="recipe-section" ${item.craftable ? '' : 'style="display:none"'}>
      <label class="field-label">Recipe Ingredients</label>
      <table class="recipe-table">
        <thead><tr>
          <th style="width:62%">Item</th>
          <th style="width:20%">Quantity</th>
          <th style="width:18%"></th>
        </tr></thead>
        <tbody id="recipe-tbody"></tbody>
      </table>
      <button class="btn btn-ghost btn-sm" id="add-ing-btn">+ Add ingredient</button>
    </div>

    <div class="editor-actions">
      ${!isNew ? `<button class="btn btn-danger btn-sm" id="delete-btn">Delete</button>` : ''}
      <span class="spacer"></span>
      <button class="btn btn-ghost btn-sm" id="cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="save-item-btn">${isNew ? 'Add item' : 'Save changes'}</button>
    </div>
  `;

  // Populate existing recipe rows
  for (const ing of recipe) addIngRow(ing.itemId, ing.qty);

  // Craftable toggle
  document.getElementById('f-craftable').addEventListener('change', e => {
    document.getElementById('recipe-section').style.display = e.target.checked ? '' : 'none';
    document.getElementById('craftable-label').textContent =
      e.target.checked ? 'Craftable (has a recipe)' : 'Raw material (no recipe)';
  });

  // Droppable toggle label
  document.getElementById('f-droppable').addEventListener('change', e => {
    e.target.closest('.toggle-row').querySelector('.toggle-label').textContent =
      e.target.checked ? 'Obtainable via drop / buy' : 'Not flagged as droppable';
  });

  document.getElementById('add-ing-btn').addEventListener('click', () => addIngRow('', 1));
  document.getElementById('save-item-btn').addEventListener('click', () => commitItem(isNew));
  document.getElementById('cancel-btn').addEventListener('click', () => {
    editingId = null;
    renderEditor(null, false);
    renderSidebar();
  });
  if (!isNew) {
    document.getElementById('delete-btn').addEventListener('click', () => deleteItem(item.id));
  }
}


function addIngRow(itemId, qty) {
  const tbody = document.getElementById('recipe-tbody');
  if (!tbody) return;

  const tr = document.createElement('tr');
  const opts = items.map(i =>
    `<option value="${esc(i.id)}" ${i.id === itemId ? 'selected' : ''}>${esc(i.name)} (${esc(i.id)})</option>`
  ).join('');

  tr.innerHTML =
    `<td><select class="recipe-item-select"><option value="">— select item —</option>${opts}</select></td>` +
    `<td><input type="number" class="recipe-qty-input" min="1" value="${qty || 1}"></td>` +
    `<td style="text-align:center"><button class="btn btn-danger btn-sm rm-btn">✕</button></td>`;

  tr.querySelector('.rm-btn').addEventListener('click', () => tr.remove());
  tbody.appendChild(tr);
}

function collectRecipe() {
  return [...document.querySelectorAll('#recipe-tbody tr')].reduce((acc, tr) => {
    const itemId = tr.querySelector('select').value;
    const qty    = parseInt(tr.querySelector('input').value, 10);
    if (itemId && qty > 0) acc.push({ itemId, qty });
    return acc;
  }, []);
}

function showNotice(msg, type) {
  const el = document.getElementById('editor-notice');
  if (!msg) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="notice notice-${type}">${esc(msg)}</div>`;
}

function commitItem(isNew) {
  const id       = document.getElementById('f-id').value.trim();
  const name     = document.getElementById('f-name').value.trim();
  const craftable  = document.getElementById('f-craftable').checked;
  const droppable  = document.getElementById('f-droppable').checked;
  const recipe     = craftable ? collectRecipe() : [];

  const errors = [];
  if (!id)   errors.push('ID is required.');
  if (!name) errors.push('Name is required.');
  if (isNew && items.find(i => i.id === id)) errors.push(`ID "${id}" already exists.`);

  if (errors.length) { showNotice(errors.join(' '), 'err'); return; }
  showNotice('', '');

  const built = { id, name };
  built.craftable = craftable;
  if (droppable) built.droppable = true;
  if (craftable && recipe.length) built.recipe = recipe;

  if (isNew) {
    items.push(built);
  } else {
    const idx = items.findIndex(i => i.id === id);
    if (idx >= 0) items[idx] = built;
  }

  editingId = id;
  unsaved   = true;
  updateBarInfo();
  renderSidebar();
  renderEditor(JSON.parse(JSON.stringify(built)), false);
  // Flash download button as reminder
  flashDownload();
}

function deleteItem(id) {
  const item = items.find(i => i.id === id);
  if (!confirm(`Delete "${item ? item.name : id}"?\n\nThis cannot be undone (until you reload the original file).`)) return;
  items = items.filter(i => i.id !== id);
  editingId = null;
  unsaved   = true;
  updateBarInfo();
  renderEditor(null, false);
  renderSidebar();
}

// ── Download ────────────────────────────────────────────────────────────────
document.getElementById('download-btn').addEventListener('click', downloadJson);

function downloadJson() {
  const out = Object.assign({}, rawData || {});
  out.items = items;
  const blob = new Blob([JSON.stringify(out, null, 2) + '\n'], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'items.json'; a.click();
  URL.revokeObjectURL(url);

  unsaved = false;
  updateBarInfo();
  const btn = document.getElementById('download-btn');
  btn.textContent = '✓ Downloaded!';
  setTimeout(() => { btn.textContent = '⬇ Download items.json'; }, 2000);
}

function flashDownload() {
  const btn = document.getElementById('download-btn');
  btn.style.borderColor = 'var(--gold)';
  btn.style.color = 'var(--gold)';
  setTimeout(() => { btn.style.borderColor = ''; btn.style.color = ''; }, 3000);
}

function updateBarInfo() {
  document.getElementById('bar-info').textContent =
    `${items.length} items` + (unsaved ? ' — unsaved changes, click Download when done' : '');
}

// ── Utils ───────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Init ────────────────────────────────────────────────────────────────────
autoLoad();
</script>
</body>
</html>
